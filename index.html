<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGZ CLIP LEAGUE</title>
    <style>
        :root { --primary: #00ff88; --bg: #0b0b0b; --card: #181818; }
        body { background-color: var(--bg); color: white; font-family: system-ui, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { width: 100%; max-width: 400px; text-align: center; }
        .progress-bar { color: var(--primary); font-weight: bold; margin-bottom: 15px; font-size: 14px; }
        #clips-wrapper { position: relative; height: 70vh; margin-bottom: 20px; border-radius: 20px; overflow: hidden; border: 2px solid #252525; background: #000; }
        .clip-card { position: absolute; inset: 0; display: none; }
        .clip-card.active { display: block; }
        iframe { width: 100%; height: 100%; border: none; }
        .controls { display: flex; justify-content: center; gap: 30px; }
        .btn { width: 70px; height: 70px; border-radius: 50%; border: none; font-size: 28px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-l { background: #ff4444; color: white; }
        .btn-w { background: var(--primary); color: black; }
        #finish-screen { display: none; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="game-ui">
            <div class="progress-bar" id="counter">טוען קליפים...</div>
            <div id="clips-wrapper"></div>
            <div class="controls">
                <button class="btn btn-l" onclick="vote('L')">L</button>
                <button class="btn btn-w" onclick="vote('W')">W</button>
            </div>
        </div>
        <div id="finish-screen">
            <h1 style="color: var(--primary);">W!</h1>
            <p>סיימת לדרג את הקליפים.</p>
        </div>
    </div>

    <script>
        // חשוב: תוודא שאלו IDs אמיתיים של קליפים שעובדים כרגע בקיק!
        const clipIDs = [
            'clip_01JRACH9Y5HGPW1A3K3SBN7P9Z',
            'clip_01JRACH9Y5HGPW1A3K3SBN7P9A'
        ];

        let currentIndex = 0;

        function init() {
            const wrapper = document.getElementById('clips-wrapper');
            const currentDomain = window.location.hostname; // זה מושך אוטומטית את הכתובת של גיטהאב

            clipIDs.forEach((id, index) => {
                const card = document.createElement('div');
                card.className = `clip-card ${index === 0 ? 'active' : ''}`;
                card.id = `clip-${index}`;
                
                // התיקון: הוספת ה-Domain לתוך הקישור כדי שקיק יאשרו את החיבור
                card.innerHTML = `<iframe 
                    src="https://player.kick.com/video/${id}?origin=https://${currentDomain}" 
                    allowfullscreen="true"
                    sandbox="allow-scripts allow-same-origin allow-presentation"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>`;
                
                wrapper.appendChild(card);
            });
            updateCounter();
        }

        function vote(v) {
            document.getElementById(`clip-${currentIndex}`).classList.remove('active');
            currentIndex++;
            if (currentIndex < clipIDs.length) {
                document.getElementById(`clip-${currentIndex}`).classList.add('active');
                updateCounter();
            } else {
                document.getElementById('game-ui').style.display = 'none';
                document.getElementById('finish-screen').style.display = 'block';
            }
        }

        function updateCounter() {
            document.getElementById('counter').innerText = `קליפ ${currentIndex + 1} מתוך ${clipIDs.length}`;
        }

        init();
    </script>
</body>
</html>
